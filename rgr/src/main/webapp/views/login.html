<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Project Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1',dark:'#1e1b4b'}}}}</script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center">
<div class="w-full max-w-md px-6">
  <div class="text-center mb-8">
    <div class="text-4xl mb-3">📋</div>
    <h1 class="text-2xl font-bold text-white">Project Manager</h1>
    <p class="text-slate-400 text-sm mt-1">Управление проектами и задачами</p>
  </div>
  <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8">
    <h2 class="text-white font-semibold text-lg mb-6">Войти в аккаунт</h2>

    <div id="msg"></div>

    <form method="post" action="login" class="space-y-4">
      <div>
        <label class="block text-slate-400 text-sm mb-1">Логин</label>
        <input name="username" type="text" required
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="username">
      </div>
      <div>
        <label class="block text-slate-400 text-sm mb-1">Пароль</label>
        <input name="password" type="password" required
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="••••••••">
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition">
        Войти
      </button>
    </form>

    <p class="text-center text-slate-500 text-sm mt-5">
      Нет аккаунта?
      <a href="register" class="text-indigo-400 hover:text-indigo-300">Зарегистрироваться</a>
    </p>
  </div>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const msg = document.getElementById('msg');
  if (p.get('error')) {
    msg.innerHTML = '<div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-4 py-3 text-sm mb-4">' + p.get('error') + '</div>';
  } else if (p.get('success')) {
    msg.innerHTML = '<div class="bg-green-900/40 border border-green-700 text-green-300 rounded-lg px-4 py-3 text-sm mb-4">' + p.get('success') + '</div>';
  }
</script>
</body>
</html>
