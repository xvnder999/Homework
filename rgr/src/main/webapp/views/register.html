<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — Project Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center py-10">
<div class="w-full max-w-md px-6">
  <div class="text-center mb-8">
    <div class="text-4xl mb-3">📋</div>
    <h1 class="text-2xl font-bold text-white">Project Manager</h1>
  </div>
  <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8">
    <h2 class="text-white font-semibold text-lg mb-6">Создать аккаунт</h2>

    <div id="msg"></div>
    <div id="confirm-block" class="hidden bg-indigo-900/40 border border-indigo-600 rounded-xl p-4 mb-4">
      <p class="text-indigo-200 text-sm font-medium mb-2">✅ Аккаунт создан!</p>
      <p class="text-slate-400 text-sm mb-3">Для подтверждения перейдите по ссылке:</p>
      <a id="confirm-link" href="#" class="text-indigo-400 hover:text-indigo-300 text-sm break-all underline"></a>
      <p class="text-slate-500 text-xs mt-3">(В реальном приложении ссылка придёт на email)</p>
    </div>

    <form method="post" action="register" class="space-y-4">
      <div>
        <label class="block text-slate-400 text-sm mb-1">Логин</label>
        <input name="username" type="text" required
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="username">
      </div>
      <div>
        <label class="block text-slate-400 text-sm mb-1">Email</label>
        <input name="email" type="email" required
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="user@example.com">
      </div>
      <div>
        <label class="block text-slate-400 text-sm mb-1">Пароль</label>
        <input name="password" type="password" required minlength="6"
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="минимум 6 символов">
      </div>
      <div>
        <label class="block text-slate-400 text-sm mb-1">Повторите пароль</label>
        <input name="confirm" type="password" required
               class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
               placeholder="••••••••">
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition">
        Зарегистрироваться
      </button>
    </form>

    <p class="text-center text-slate-500 text-sm mt-5">
      Уже есть аккаунт?
      <a href="login" class="text-indigo-400 hover:text-indigo-300">Войти</a>
    </p>
  </div>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const msg = document.getElementById('msg');
  if (p.get('error')) {
    msg.innerHTML = '<div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-4 py-3 text-sm mb-4">' + p.get('error') + '</div>';
  }
  if (p.get('success') && p.get('token')) {
    document.getElementById('confirm-block').classList.remove('hidden');
    const base = location.origin + location.pathname.replace('register', 'confirm');
    const link = base + '?token=' + p.get('token');
    const a = document.getElementById('confirm-link');
    a.href = link;
    a.textContent = link;
  }
</script>
</body>
</html>
